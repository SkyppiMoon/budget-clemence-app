<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Le Budget de Clémence</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section id="loginView" class="login-view">
  <div class="login-card">
    <p class="brand">Le Budget de</p>
    <h1 class="brand-title">Clémence</h1>

    <p class="login-intro">
      Connecte-toi pour accéder à ton budget.
    </p>

    <form id="loginForm">
      <div class="field">
        <label for="loginEmail">
          Adresse e-mail
        </label>

        <input
          type="email"
          id="loginEmail"
          autocomplete="email"
          required
        >
      </div>

      <div class="field">
        <label for="loginPassword">
          Mot de passe
        </label>

        <input
          type="password"
          id="loginPassword"
          autocomplete="current-password"
          required
        >
      </div>

      <p
        id="loginError"
        class="login-error"
        aria-live="polite"
      ></p>

      <button
        type="submit"
        id="loginButton"
        class="btn btn-primary"
      >
        Se connecter
      </button>
    </form>
  </div>
</section>
  
<div id="app" hidden>

<div class="topbar">
  <div class="topbar-heading">
    <div>
      <p class="brand">Le Budget de</p>
      <h1 class="brand-title">Clémence</h1>
    </div>

    <button
      type="button"
      id="logoutButton"
      class="logout-button"
    >
      Se déconnecter
    </button>
  </div>
    <div class="month-switcher">
      <button class="month-btn" id="prevMonth">‹</button>
      <div class="month-label" id="monthLabel">—</div>
      <button class="month-btn" id="nextMonth">›</button>
    </div>
  </div>

  <!-- RÉSUMÉ -->
  <div class="view active" id="view-resume">
    <div class="hero">
      <p class="hero-eyebrow">Reste à dépenser</p>
      <p class="hero-amount" id="heroLeft">—</p>
      <p class="hero-sub" id="heroSub">—</p>
      <div class="hero-row">
        <div class="hero-stat"><div class="n" id="heroIncome">—</div><div class="l">Revenus</div></div>
        <div class="hero-stat"><div class="n" id="heroSpent">—</div><div class="l">Dépensé</div></div>
      </div>
    </div>

    <div class="card">
      <p class="card-title">Répartition Fixes / Besoins / Envies</p>
      <div id="repartitionBars"></div>
    </div>

    <div id="categoryBreakdown"></div>
  </div>

  <!-- MOUVEMENTS -->
  <div class="view" id="view-tx">
    <div id="txList"></div>
  </div>

  <!-- BUDGET -->
  <div class="view" id="view-budget">
    <div class="card">
      <p class="card-title">Revenus mensuels</p>
      <div id="incomeList"></div>
      <button class="btn btn-secondary" style="margin-top:10px;" id="addIncomeBtn">+ Ajouter un revenu</button>
    </div>

    <div class="card">
      <div class="type-heading" style="margin-top:0;"><span class="dot oblig"></span><span>Fixes</span></div>
      <div id="catOblig"></div>
      <div class="type-heading"><span class="dot besoins"></span><span>Besoins</span></div>
      <div id="catBesoins"></div>
      <div class="type-heading"><span class="dot envies"></span><span>Envies</span></div>
      <div id="catEnvies"></div>
      <button class="btn btn-secondary" style="margin-top:14px;" id="addCatBtn">+ Ajouter une catégorie</button>
    </div>
  </div>

  <button class="add-fab" id="fabAdd">+</button>

  <div class="tabbar">
    <button class="tab-btn active" data-view="resume">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 13a8 8 0 1 1 16 0"/><path d="M12 13l4-4"/><circle cx="12" cy="13" r="1"/></svg>
      <span>Résumé</span>
    </button>
    <button class="tab-btn" data-view="tx">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
      <span>Mouvements</span>
    </button>
    <button class="tab-btn" data-view="budget">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M3 10h18"/></svg>
      <span>Budget</span>
    </button>
  </div>
</div>

<!-- OVERLAY / SHEET -->
<div class="overlay" id="overlay">
  <div class="sheet" id="sheetContent"></div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
